    function setSidebarCollapsed(collapsed) { const label = collapsed ? '展开' : '收起'; shell.classList.toggle('sidebar-collapsed', collapsed); sidebarToggle.setAttribute('aria-expanded', String(!collapsed)); sidebarToggle.setAttribute('aria-label', label); sidebarToggle.querySelector('.toggle-text').textContent = label; } function filterSchoolButtons() { const keyword = schoolSearch.value.trim().toLowerCase(); buttons.forEach(button => { const label = button.dataset.school === '__all__' ? allLabel : button.dataset.school; button.hidden = Boolean(keyword) && !label.toLowerCase().includes(keyword); }); } sidebarToggle.addEventListener('click', () => setSidebarCollapsed(!shell.classList.contains('sidebar-collapsed'))); buttons.forEach(button => button.addEventListener('click', () => { activeSchool = button.dataset.school; buttons.forEach(item => item.classList.toggle('active', item === button)); render(); })); search.addEventListener('input', render); schoolSearch.addEventListener('input', filterSchoolButtons); filterSchoolButtons(); render();
