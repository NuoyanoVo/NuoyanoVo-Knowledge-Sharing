<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教育技术教师人物索引</title>
  <link rel="icon" type="image/svg+xml" href="../assets/site-icon.svg">
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --ink:#172033; --muted:#667085; --line:#d9e0ea; --accent:#1f7a8c; --accent-strong:#13505b; --shadow:0 14px 34px rgba(17,32,51,.10); }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; color:var(--ink); background:var(--bg); font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif; } a { color:inherit; }
    .shell { display:grid; grid-template-columns:292px minmax(0,1fr); min-height:100vh; transition:grid-template-columns .2s ease; } .shell.sidebar-collapsed { grid-template-columns:0 minmax(0,1fr); } .sidebar { position:sticky; top:0; height:100vh; overflow:auto; padding:18px 14px 24px; background:#102a43; color:#f6fbff; border-right:1px solid rgba(255,255,255,.08); transition:padding .2s ease, border-color .2s ease, transform .2s ease; } .shell.sidebar-collapsed .sidebar { transform:none; padding-left:0; padding-right:0; border-right-color:transparent; overflow:visible; } .shell.sidebar-collapsed .sidebar > :not(.sidebar-toggle) { opacity:0; pointer-events:none; visibility:hidden; } .sidebar-toggle { position:sticky; top:14px; z-index:20; width:38px; height:38px; border:1px solid #315875; border-radius:8px; background:#18334d; color:#d7e6f1; box-shadow:0 8px 18px rgba(3,16,31,.24); cursor:pointer; display:grid; place-items:center; padding:0; margin:0 0 18px auto; overflow:visible; font:600 13px/1 "Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif; transition:background .2s ease, border-color .2s ease, box-shadow .2s ease, transform .2s ease; } .sidebar-toggle:hover,.sidebar-toggle:focus-visible { background:#1f4665; border-color:#5d8daa; box-shadow:0 10px 24px rgba(3,16,31,.34); outline:none; } .toggle-icon { width:30px; height:30px; border-radius:6px; background:#1d2430; display:grid; place-items:center; flex:0 0 auto; } .toggle-icon::before { content:""; width:10px; height:10px; border-top:3px solid #aeb8c4; border-right:3px solid #aeb8c4; transform:rotate(-135deg); transition:transform .2s ease; } .toggle-text { position:absolute; top:50%; right:calc(100% + 10px); left:auto; z-index:60; transform:translateY(-50%); min-width:max-content; padding:8px 10px; border:1px solid #426b86; border-radius:8px; background:#17344d; color:#edf6fb; box-shadow:0 10px 24px rgba(3,16,31,.28); opacity:0; pointer-events:none; visibility:hidden; transition:opacity .15s ease, visibility .15s ease; } .sidebar-toggle:hover .toggle-text,.sidebar-toggle:focus-visible .toggle-text { opacity:1; visibility:visible; } .shell.sidebar-collapsed .sidebar-toggle { position:fixed; top:18px; left:12px; margin:0; transform:none; } .shell.sidebar-collapsed .toggle-text { right:auto; left:calc(100% + 10px); } .shell.sidebar-collapsed .toggle-icon::before { transform:rotate(45deg); }
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:22px; } .brand-mark { width:34px; height:34px; border-radius:8px; background:#35a0ab; display:grid; place-items:center; font-weight:800; } .brand h1 { margin:0; font-size:18px; line-height:1.25; }
    .back { display:inline-flex; margin:0 0 20px; color:#c7d7e7; font-size:13px; text-decoration:none; } .side-title { margin:12px 0 10px; color:#9fb6cc; font-size:12px; letter-spacing:0; } .school-search { width:100%; height:38px; margin:0 0 10px; border:1px solid #315875; border-radius:8px; padding:0 10px; background:#0c2238; color:#f6fbff; font:inherit; outline:none; } .school-search::placeholder { color:#8fa8bf; } .school-search:focus { border-color:#56c0cd; box-shadow:0 0 0 3px rgba(86,192,205,.14); } .school-list { display:grid; gap:8px; }
    .school-button { width:100%; min-height:42px; border:1px solid rgba(255,255,255,.10); border-radius:8px; padding:8px 10px; color:#e9f2fb; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer; text-align:left; font:inherit; } .school-button[hidden] { display:none; } .school-button span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; } .school-button b { min-width:28px; height:24px; border-radius:999px; display:grid; place-items:center; background:rgba(255,255,255,.12); font-size:12px; } .school-button:hover,.school-button.active { background:#1f7a8c; border-color:#56c0cd; }
    .content { padding:28px clamp(18px,4vw,52px) 48px; } .topbar { display:flex; justify-content:space-between; gap:20px; align-items:flex-start; margin-bottom:24px; } .title-block h2 { margin:0 0 8px; font-size:clamp(26px,4vw,42px); letter-spacing:0; } .title-block p { margin:0; color:var(--muted); line-height:1.7; max-width:760px; } .meta { min-width:220px; padding:12px 14px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--muted); font-size:13px; line-height:1.7; }
    .toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; } .current { font-size:18px; font-weight:700; } .search { width:min(360px,100%); height:42px; border:1px solid var(--line); border-radius:8px; padding:0 13px; background:#fff; color:var(--ink); font:inherit; outline:none; } .search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(31,122,140,.16); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:16px; } .card { min-height:238px; background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); padding:14px; display:grid; justify-items:center; align-content:start; gap:10px; text-decoration:none; } .card:hover { border-color:#84b8c2; transform:translateY(-1px); }
    .portrait-wrap { width:96px; height:128px; padding:4px; border:1px solid #cbd5e1; background:#fff; box-shadow:0 4px 12px rgba(15,23,42,.08); } .portrait { width:100%; height:100%; object-fit:cover; display:block; background:#eef2f7; } .name { width:100%; min-height:26px; text-align:center; font-weight:700; font-size:16px; line-height:1.35; overflow-wrap:anywhere; } .school { width:100%; text-align:center; color:var(--muted); font-size:12px; line-height:1.35; min-height:32px; } .origin { color:var(--accent-strong); font-size:12px; } .no-photo { color:#8a5b18; font-size:12px; } .empty { display:none; padding:42px 20px; text-align:center; border:1px dashed var(--line); border-radius:8px; color:var(--muted); background:#fff; } .empty.show { display:block; }
    @media (max-width:860px) { .shell,.shell.sidebar-collapsed { grid-template-columns:1fr; } .sidebar { position:relative; height:auto; max-height:46vh; transform:none; padding:12px 14px; } .shell.sidebar-collapsed .sidebar { max-height:0; padding:0; overflow:visible; } .sidebar-toggle { position:relative; top:0; margin:0 0 12px auto; } .shell.sidebar-collapsed .sidebar-toggle { position:fixed; top:12px; left:12px; margin:0; } .content { padding-top:22px; } .shell.sidebar-collapsed .content { padding-top:58px; } .topbar,.toolbar { flex-direction:column; align-items:stretch; } .meta { min-width:0; } .grid { grid-template-columns:repeat(auto-fill,minmax(142px,1fr)); } }
  </style>
</head>
<body>
  <div class="shell" id="shell"><aside class="sidebar" id="schoolSidebar"><button class="sidebar-toggle" id="sidebarToggle" type="button" aria-controls="schoolSidebar" aria-expanded="true" aria-label="收起"><span class="toggle-icon" aria-hidden="true"></span><span class="toggle-text">收起</span></button><a class="back" href="../index.html">返回主页</a><div class="brand"><div class="brand-mark">ET</div><h1>教育技术教师人物索引</h1></div><div class="side-title">学校列表</div><input class="school-search" id="schoolSearch" type="search" placeholder="检索学校" autocomplete="off" aria-label="检索学校"><nav class="school-list" id="schoolList" aria-label="学校列表"></nav></aside>
  <main class="content"><section class="topbar"><div class="title-block"><h2>教育技术教师人物索引</h2></div></section><section class="toolbar" aria-label="人物列表"><div class="current" id="currentSchool">加载中...</div><input class="search" id="search" type="search" placeholder="搜索姓名或学校" autocomplete="off"></section><section class="grid" id="grid"></section><div class="empty" id="empty">没有匹配的人物条目</div></main></div>
  <script>
    const dataUrl = 'teachers.json';
    const fallbackAvatar = 'teacher_profile_photos/placeholder.svg';
    const allLabel = '全部';
    const countSuffix = '人';
    const photoAlt = '照片';
    let people = [];
    let activeSchool = '__all__';
    let schoolButtons = [];

    const shell = document.getElementById('shell');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const currentSchool = document.getElementById('currentSchool');
    const search = document.getElementById('search');
    const schoolSearch = document.getElementById('schoolSearch');
    const schoolList = document.getElementById('schoolList');

    function normalizePerson(person) {
      return {
        name: person.name || '',
        school: person.school || '',
        avatar: person.avatar || fallbackAvatar,
        url: person.url || '#'
      };
    }

    function filteredPeople() {
      const keyword = search.value.trim().toLowerCase();
      return people.filter(person => {
        const bySchool = activeSchool === '__all__' || person.school === activeSchool;
        const haystack = (person.name + ' ' + person.school).toLowerCase();
        return bySchool && (!keyword || haystack.includes(keyword));
      });
    }

    function schoolEntries() {
      const counts = new Map();
      people.forEach(person => counts.set(person.school, (counts.get(person.school) || 0) + 1));
      return [
        { school: '__all__', label: allLabel, count: people.length },
        ...Array.from(counts, ([school, count]) => ({ school, label: school, count }))
      ];
    }

    function renderSchoolList() {
      schoolList.replaceChildren(...schoolEntries().map(entry => {
        const button = document.createElement('button');
        button.className = 'school-button';
        button.type = 'button';
        button.dataset.school = entry.school;
        button.classList.toggle('active', entry.school === activeSchool);

        const label = document.createElement('span');
        label.textContent = entry.label;
        const count = document.createElement('b');
        count.textContent = entry.count;

        button.append(label, count);
        button.addEventListener('click', () => {
          activeSchool = entry.school;
          schoolButtons.forEach(item => item.classList.toggle('active', item === button));
          render();
        });
        return button;
      }));
      schoolButtons = Array.from(schoolList.querySelectorAll('.school-button'));
      filterSchoolButtons();
    }

    function createCard(person) {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = person.url;
      card.target = '_blank';
      card.rel = 'noreferrer';
      card.title = person.name + '-' + person.school;

      const portraitWrap = document.createElement('span');
      portraitWrap.className = 'portrait-wrap';
      const portrait = document.createElement('img');
      portrait.className = 'portrait';
      portrait.src = person.avatar;
      portrait.alt = person.name + photoAlt;
      portrait.loading = 'lazy';
      portrait.addEventListener('error', () => {
        if (portrait.dataset.fallbackApplied) return;
        portrait.dataset.fallbackApplied = 'true';
        portrait.src = fallbackAvatar;
      });
      portraitWrap.append(portrait);

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = person.name;
      const school = document.createElement('span');
      school.className = 'school';
      school.textContent = person.school;

      card.append(portraitWrap, name, school);
      return card;
    }

    function render() {
      const rows = filteredPeople();
      const label = activeSchool === '__all__' ? allLabel : activeSchool;
      currentSchool.textContent = label + ' ' + rows.length + ' ' + countSuffix;
      grid.replaceChildren(...rows.map(createCard));
      empty.classList.toggle('show', rows.length === 0);
    }

    function setSidebarCollapsed(collapsed) {
      const label = collapsed ? '展开' : '收起';
      shell.classList.toggle('sidebar-collapsed', collapsed);
      sidebarToggle.setAttribute('aria-expanded', String(!collapsed));
      sidebarToggle.setAttribute('aria-label', label);
      sidebarToggle.querySelector('.toggle-text').textContent = label;
    }

    function filterSchoolButtons() {
      const keyword = schoolSearch.value.trim().toLowerCase();
      schoolButtons.forEach(button => {
        const label = button.dataset.school === '__all__' ? allLabel : button.dataset.school;
        button.hidden = Boolean(keyword) && !label.toLowerCase().includes(keyword);
      });
    }

    async function loadPeople() {
      try {
        const response = await fetch(dataUrl, { cache: 'no-cache' });
        if (!response.ok) throw new Error('Failed to load ' + dataUrl + ': ' + response.status);
        const data = await response.json();
        if (!Array.isArray(data)) throw new Error(dataUrl + ' must contain an array');
        people = data.map(normalizePerson).filter(person => person.name && person.school);
        renderSchoolList();
        render();
      } catch (error) {
        console.error(error);
        currentSchool.textContent = '人员数据加载失败';
        empty.textContent = '人员数据加载失败，请通过本地服务器访问页面';
        empty.classList.add('show');
      }
    }

    sidebarToggle.addEventListener('click', () => setSidebarCollapsed(!shell.classList.contains('sidebar-collapsed')));
    search.addEventListener('input', render);
    schoolSearch.addEventListener('input', filterSchoolButtons);
    loadPeople();
  </script>
</body>
</html>
